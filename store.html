<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Windows Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        .search-bar { position: relative; display: inline-block; }
        #search-input { padding-right: 30px; width: 300px; height: 15px; font-size: 16px; }
        .search-bar i { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: gray; }
    </style>
<style>
    /* Metro Hero Container */
    .featured-hero {
	display: inline-block;
    float: left;
    width: 500px;
    height: 330px;
    margin: 10px;
    margin-left: 100px;
    margin-right: 100px;

    /* Increased internal spacing */

    text-align: left;
    background: #fff;

    /* Invisible border to prevent layout shift */
    border: 3px solid transparent;

    cursor: pointer;
    transition: border-color 0.15s ease;
}

    /* Modern UI Image handling */
    .featured-hero img { 
        width: 100%;  
    }

    .featured-caption {
        bottom: 0;
        left: 0;
        right: 0;
        padding: 15px 15px;
        color: light-gray;
    }

    .featured-caption h2 {
    	padding-left: 5px;
    }

    /* Subtle hover effect for IE10 */
    .featured-hero:hover {
        outline: 3px solid #ccc;
    }

/* Scroll Container */
.horizontalScroll {
    display: flex;

    width: 100%; overflow-x: auto; overflow-y: hidden; white-space: nowrap;
    height: 625px;
    background: transparent;
    -ms-overflow-style: -ms-autohiding-scrollbar;
}

#app-list .app-box {
    display: inline-block !important;
    vertical-align: top;
    white-space: normal;
    margin-right: 15px;
    margin-bottom: 5px;
    box-sizing: content-box; 
}
.app-column {
    display: inline-block;    vertical-align: top;
    white-space: normal;   
    margin-right: 15px;}
</style>
</head>

<body>
    <div class="header">
        <div class="header-left">
            <img src="res/logo.png" alt="Store Logo">
            <a href="store.html" class="bgGreen"><h1>Home</h1></a>
            <a href="pages/topcharts.html" class="topLink"><h1>Top Charts</h1></a>
            <a href="pages/categories.html" class="topLink"><h1>Categories</h1></a>
            <a href="comingSoon.xaml" class="topLink"><h1>Collections</h1></a>
            <a href="account.html" class="topLink"><h1>Account</h1></a>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search for apps...">
            <i onclick="submitSearch()" class="fa fa-search"></i>
        </div>
    </div>

    <h1 class="pageTitle" style="padding-left: 40px;">Store</h1>
    <div class="horizontalScroll">
	<div class="contentPane">
	    <div id="featured-container"></div>
	</div>
	<div class="contentPane">
	    <h2 class="pageTitle">Featured</h2>
	    <div id="app-list" class="store-container"></div>
	</div>
    </div>

<script type="text/javascript">
    function searchApps() {
        var input = document.getElementById("search-input");
        var filter = input.value.toLowerCase();
        var apps = document.querySelectorAll(".app-box"); 
        for (var i = 0; i < apps.length; i++) {
            var title = apps[i].getElementsByTagName("h3")[0] || apps[i].getElementsByTagName("span")[0];
            if (title) {
                var textValue = title.textContent || title.innerText;
                if (textValue.toLowerCase().indexOf(filter) > -1) {
                    apps[i].style.display = ""; 
                } else {
                    apps[i].style.display = "none"; 
                }
            }
        }
    }

    function loadFeatured() {
        var xhr = new XMLHttpRequest();
        // IE10 cache buster
        xhr.open("GET", "https://ms-store-appx.github.io/featured.xml", true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState == 4 && xhr.status == 200) {
                var xml = xhr.responseXML;
                // Fallback for older parsing if responseXML fails
                if (!xml || !xml.documentElement) {
                    if (typeof DOMParser !== "undefined") {
                        xml = new DOMParser().parseFromString(xhr.responseText, "text/xml");
                    }
                }

                var mainItem = xml.getElementsByTagName("mainItem")[0];
                if (mainItem) {
                    var img = mainItem.getElementsByTagName("image")[0].childNodes[0].nodeValue;
                    var cap = mainItem.getElementsByTagName("caption")[0].childNodes[0].nodeValue;
                    
                    var featHtml = '<div class="featured-hero">' +
                                   '<img src="' + img + '" alt="Featured">' +
                                   '<div class="featured-caption"><h2>' + cap + '</h2></div>' +
                                   '</div>' + 
				   '<div id="collections-row"></div>';
                    document.getElementById("featured-container").innerHTML = featHtml;
                }
	    }
        };
        xhr.send();
    }

    function loadXML() {
    // Step 1: Load featured.xml to get appIDs
    var xhrFeat = new XMLHttpRequest();
    xhrFeat.open("GET", "https://ms-store-appx.github.io/featured.xml", true);

    xhrFeat.onreadystatechange = function () {
        if (xhrFeat.readyState === 4 && xhrFeat.status === 200) {

            var xmlFeat = xhrFeat.responseXML;
            if (!xmlFeat || !xmlFeat.documentElement) {
                xmlFeat = new DOMParser().parseFromString(xhrFeat.responseText, "text/xml");
            }

            var featuredApps = xmlFeat.getElementsByTagName("app");
            var featuredIDs = [];

            for (var i = 0; i < featuredApps.length; i++) {
                var idNode = featuredApps[i].getElementsByTagName("appID")[0];
                if (idNode) {
                    featuredIDs.push(idNode.textContent.trim());
                }
            }

            // Step 2: Now load data.xml and match apps
            loadAppsFromCatalog(featuredIDs);
        }
    };

    xhrFeat.send();
}

function loadCollections() {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "https://ms-store-appx.github.io/featured.xml", true);

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {

            var xml = xhr.responseXML;
            if (!xml || !xml.documentElement) {
                xml = new DOMParser().parseFromString(xhr.responseText, "text/xml");
            }

            var collections = xml.getElementsByTagName("collection");
            if (collections.length === 0) return;

            var row = document.getElementById("collections-row");
            row.innerHTML = "";

            // Only take the first two
            for (var i = 0; i < 2 && i < collections.length; i++) {
                var col = collections[i];

                var id = col.getElementsByTagName("id")[0].textContent;
                var title = col.getElementsByTagName("caption")[0].textContent;
                var image = col.getElementsByTagName("image")[0].textContent;

                var tile = document.createElement("div");
                tile.className = "collection-tile";
                tile.onclick = (function (cid) {
                    return function () {
                        window.location.href = "pages/collection.html?id=" + cid;
                    };
                })(id);

                var img = document.createElement("img");
                img.src = image;

                var label = document.createElement("div");
                label.className = "collection-title";
                label.innerText = title;

                tile.appendChild(img);
                tile.appendChild(label);
                row.appendChild(tile);
            }
        }
    };

    xhr.send();
}


function loadXML() {
    // Step 1: Load featured.xml to get appIDs
    var xhrFeat = new XMLHttpRequest();
    xhrFeat.open("GET", "https://ms-store-appx.github.io/featured.xml", true);

    xhrFeat.onreadystatechange = function () {
        if (xhrFeat.readyState === 4 && xhrFeat.status === 200) {

            var xmlFeat = xhrFeat.responseXML;
            if (!xmlFeat || !xmlFeat.documentElement) {
                xmlFeat = new DOMParser().parseFromString(xhrFeat.responseText, "text/xml");
            }

            var featuredApps = xmlFeat.getElementsByTagName("app");
            var featuredIDs = [];

            for (var i = 0; i < featuredApps.length; i++) {
                var idNode = featuredApps[i].getElementsByTagName("appID")[0];
                if (idNode) {
                    featuredIDs.push(idNode.textContent.replace(/^\s+|\s+$/g, ""));
                }
            }

            // Step 2: Load data.xml and match apps
            loadAppsFromCatalog(featuredIDs);
        }
    };

    xhrFeat.send();
}


function loadAppsFromCatalog(featuredIDs) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "https://ms-store-appx.github.io/data.xml", true);

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {

            var xml = xhr.responseXML;
            if (!xml || !xml.documentElement) {
                xml = new DOMParser().parseFromString(xhr.responseText, "text/xml");
            }

            var apps = xml.getElementsByTagName("app");
            var output = "";
            var matchedApps = [];

            // Step 3: Filter apps by featured appIDs
            for (var i = 0; i < apps.length; i++) {
                var appID = getTag(apps[i], "appID", null);
                if (appID && featuredIDs.indexOf(appID) !== -1) {
                    matchedApps.push(apps[i]);
                }
            }

            // Step 4: Render matched apps
            for (var i = 0; i < matchedApps.length; i++) {

                if (i % 2 === 0) {
                    output += '<div class="app-column">';
                }

                var app = matchedApps[i];

                var name = getTag(app, "name", "Unknown");
                var category = getTag(app, "category", "Unknown");
                var description = getTag(app, "description", "No description available.");
                var appID = getTag(app, "appID", "store");
                var price = getTag(app, "price", "0");

		var encodedPrice = "";

		if (price === "0") {
            	    encodedPrice = "Free";
        	} else if (price === "x") {
            	    encodedPrice = "Unavailable";
        	} else if (price.indexOf("https://") !== -1) {
	    	    encodedPrice = "Free";
		} else {
            	    encodedPrice = "$" + price;
        	}

                output += '<div class="app-wrapper">';
                output += '<div class="app-box" onclick="redirectToAppPage(' +
                    '\'' + encodeURIComponent(appID) + '\'' +
                ')">';

                output += '<img src="https://ms-store-appx.github.io/appRes/' + appID + '/StoreLogo.png" alt="' + name + '">';
                output += '<h3>' + name + '</h3>';
		output += '<h4>' + encodedPrice + '</h4>';
                output += '<p>' + category + '</p>';
                output += '</div></div>';

                if (i % 2 === 1 || i === matchedApps.length - 1) {
                    output += '</div>';
                }
            }

            document.getElementById("app-list").innerHTML = output;
        }
    };

    xhr.send();
}


// Helper to safely read XML tags
function getTag(parent, tag, fallback) {
    var node = parent.getElementsByTagName(tag)[0];
    if (!node) return fallback;
    var text = node.textContent || node.innerText;
    return text ? text : fallback;
}


    function redirectToAppPage(appID) {
        window.location.href = "appDesc.html?appID=" + appID;
    }

    window.onload = function() {
        loadFeatured(); // Load Hero first
        loadXML();      // Load App list
	loadCollections();
    };
</script>

    <script>

function submitSearch() {
    var box = document.getElementById("search-input");
    var term = box.value;

    if (!term || term.replace(/\s+/g, "") === "") {
        alert("Please enter a search term.");
        return;
    }

    // Encode for URL (IE‑safe)
    var encoded = encodeURIComponent(term);

    // Redirect to your search page
    window.location.href = "pages/search.html?search=" + encoded;
}
</script>
</body>
</html>
