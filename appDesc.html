<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Windows Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
    .back-button {
	padding-left: 10px;
    padding-right: 20px;
    float: left;
    },
.storeContent {
    padding: 30px 60px;
    font-family: "Segoe UI", sans-serif;
    color: #000;
}

/* Back button */
.back-button img {
    width: 32px;
    height: 32px;
    padding-top: 25px;
    margin-bottom: 20px;
    cursor: pointer;
}

/* Two-column layout using floats (IE11/WebView safe) */
.details-shell {
    overflow: hidden; /* clears floats */
}

/* LEFT COLUMN — all text */
.details-left {
    float: left;
    width: 360px;
    padding-top: 30px;
}

/* RIGHT COLUMN — preview image */
.details-right {
    float: left;
    padding-left: 100px;
    width: 420px;
    padding-top: 30px;
    margin-top: 65px;
}

/* Move the preview image into the right column */
.app-box-img {
    width: auto;
    height: 420px;
    border: none;
    display: block;
    margin-bottom: 20px;
}

/* Title */
#app-container h1 {
    font-size: 32px;
    font-weight: 300;
    margin: 0 0 10px 0;
}

/* Metadata (publisher, category, etc.) */
#app-container p {
    font-size: 14px;
    margin: 2px 0;
}

/* Install button */
.install-btn {
    display: inline-block;
    margin: 10px 0 14px 0;
    padding: 8px 20px;
    background: #008a00;
    color: #fff;
    font-size: 16px;
    text-decoration: none;
    border: none;
}

.disabledInstallButton {
    display: inline-block;
    margin: 10px 0 14px 0;
    padding: 8px 20px;
    background: #d9d9d9;
    color: gray;
    font-size: 16px;
    text-decoration: none;
    border: none;
}

.install-btn:hover {
    background: #096d09;
}

/* Description (3rd <p>) */
#app-container p:nth-of-type(3) {
    margin-top: 20px;
    padding-bottom: 20px;
    font-size: 14px;
    line-height: 1.4;
}

/* "Features:" label */
#app-container p:nth-of-type(4) {
    margin-top: 20px;
    font-size: 14px;
    padding-top: 10px;
}

/* Features list */
#app-container ul {
    margin-top: 6px;
    padding-left: 18px;
    font-size: 14px;
    padding-top: 5px;
}

#app-container li {
    margin-bottom: 4px;
}
.greenLink {
    text-decoration: none;
    color: #008A00;
}
</style>
<script>
function getUrlParams() {
    var params = {};
    var qs = window.location.search.substring(1).split("&");
    for (var i = 0; i < qs.length; i++) {
        var p = qs[i].split("=");
        if (p.length === 2) {
            params[unescape(p[0])] = unescape(p[1]);
        }
    }
    return params;
}

function loadXML(url, callback) {
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
            callback(xhr.responseText);
        }
    };
    xhr.open("GET", url, true);
    xhr.send();
}

function safeText(parent, tag, fallback) {
    var node = parent.getElementsByTagName(tag)[0];
    if (!node || !node.textContent) {
        return fallback;
    }
    return node.textContent;
}

function safeList(parent, tag) {
    var out = [];
    var container = parent.getElementsByTagName(tag)[0];
    if (!container) {
        return out;
    }
    var features = container.getElementsByTagName("feature");
    for (var i = 0; i < features.length; i++) {
        if (features[i].textContent) {
            out.push(features[i].textContent);
        }
    }
    return out;
}

function loadAppDetails() {
    var params = getUrlParams();
    var appID = params["appID"];

    if (!appID) {
        alert("No appID provided.");
        return;
    }

    loadXML("https://ms-store-appx.github.io/data.xml", function (xmlText) {

        var parser = new DOMParser();
        var xml = parser.parseFromString(xmlText, "text/xml");
        var apps = xml.getElementsByTagName("app");

        var found = null;

        for (var i = 0; i < apps.length; i++) {
            var idNode = apps[i].getElementsByTagName("appID")[0];
            if (idNode && idNode.textContent === appID) {
                found = apps[i];
                break;
            }
        }

        if (!found) {
            alert("App not found in data.xml");
            return;
        }

        // Extract fields
        var name = safeText(found, "name", "Unknown App");
	var publisher = safeText(found, "publisher", "Unknown Publisher");
	var category = safeText(found, "category", "Unknown Category");
	var description = safeText(found, "description", "No description available.");
	var rating = safeText(found, "rating", "1");
	var price = safeText(found, "price", "0");

	var featuresNode = found.getElementsByTagName("features")[0];
        var features = [];
        if (featuresNode) {
            var items = featuresNode.getElementsByTagName("feature");
            for (var j = 0; j < items.length; j++) {
                features.push(items[j].textContent);
            }
        }

        // Populate UI
        var appContainer = document.getElementById("app-container");
        var detailsRight = document.getElementById("details-right");

        appContainer.innerHTML = "";
        detailsRight.innerHTML = "";

        // Title
        var title = document.createElement("h1");
        title.innerText = name;
        appContainer.appendChild(title);

        // Install button
        var install = document.createElement("a");
        install.href = "https://ms-store-appx.github.io/install/" + appID + ".ps1";

        if (price === "0") {
            install.className = "install-btn";
            install.innerText = "Install";
        } else if (price === "x") {
            install.className = "disabledInstallButton";
            install.innerText = "Install";
        } else if (price.indexOf("https://") !== -1) {
	    install.className = "greenLink";
	    install.innerText = "Get from publisher";
	    install.href = 'javascript:window.open("' + price + '"); window.navigate("/appDesc.html?appID=' + appID + '");';
	} else {
            install.className = "install-btn";
            install.innerText = "Buy";
        }

        appContainer.appendChild(install);

	var supportedArchitectures;
	if (appID.indexOf("neutral") !== -1) {
	    supportedArchitectures = "x86, x64, ARM";
	} else {
	    supportedArchitectures = "x86";
	}

        // Price label
        var priceLabel = document.createElement("h2");
        if (price === "0") {
            priceLabel.innerText = "Free";
        } else if (price === "x") {
            priceLabel.innerText = "Unavailable";
        } else if (price.indexOf("https://") !== -1) {
	    priceLabel.innerText = "";
	} else {
            priceLabel.innerText = "$" + price;
        }
        appContainer.appendChild(priceLabel);

        // Description
        var desc = document.createElement("p");
        desc.innerHTML = "<strong>Description</strong><br>" + description;
        appContainer.appendChild(desc);

        // ESRB rating
        var esrb = document.createElement("img");
        esrb.src = "https://ms-store-appx.github.io/storefront/images/ratings12esrb-cdn/esrb" + rating + "r.png";
        esrb.className = "esrbLogo";
        appContainer.appendChild(esrb);

        // Features
        var featLabel = document.createElement("p");
        featLabel.innerHTML = "<strong>Features</strong>";
        appContainer.appendChild(featLabel);

        var ul = document.createElement("ul");
        for (var k = 0; k < features.length; k++) {
            var li = document.createElement("li");
            li.innerText = features[k];
            ul.appendChild(li);
        }
        appContainer.appendChild(ul);

        // Right column (icon + metadata)
        var icon = document.createElement("img");
	icon.className = "app-box-img";
	icon.src = "https://ms-store-appx.github.io/appRes/" + appID + "/screenshot.png";
	icon.onerror = function () {
	    this.onerror = null;
	    this.src = "https://ms-store-appx.github.io/appRes/" + appID + "/StoreLogo.png";
	};
	detailsRight.appendChild(icon);

        var pub = document.createElement("p");
        pub.innerHTML = "Published by " + publisher;
        detailsRight.appendChild(pub);

        var cat = document.createElement("p");
        cat.innerHTML = 'Category <a class="greenLink" href="pages/categoryPage.html?category=' + encodeURIComponent(category) + '">' + category + '</a>';
        detailsRight.appendChild(cat);

	var arch = document.createElement("p");
	arch.innerHTML = "Supported processors: " + supportedArchitectures;
	detailsRight.appendChild(arch);
    });
}

window.onload = function () {
    setTimeout(loadAppDetails, 100);
};
</script>

    <script>

function submitSearch() {
    var box = document.getElementById("search-input");
    var term = box.value;

    // Prevent empty searches
    if (!term || term.replace(/\s+/g, "") === "") {
        alert("Please enter a search term.");
        return;
    }

    // Encode for URL (IE‑safe)
    var encoded = encodeURIComponent(term);

    // Redirect to your search page
    window.location.href = "pages/search.html?search=" + encoded;
}
</script>

</head>
<body>
    <div class="header">
	<div class="header-left">
	    <img src="res/logo.png" alt="Store Logo">
	    <a href="store.html" class="bgGreen"><h1>Home</h1></a>
	    <a href="pages/topcharts.html" class="topLink"><h1>Top Charts</h1></a>
	    <a href="pages/categories.html" class="topLink"><h1>Categories</h1></a>
	    <a href="comingSoon.xaml" class="topLink"><h1>Collections</h1></a>
	    <a href="account.html" class="topLink"><h1>Account</h1></a>
	</div>
	<div class="search-bar">
    	<input type="text" id="search-input" placeholder="Search for apps...">
        <i onclick="submitSearch()" class="fa fa-search"></i>
	</div>
    </div>
    <div class="storeContent">
        <a id="back-button" class="back-button" onclick="history.back()">
            <img src="res/ui/back_button_default.png">
        </a>
        <div class="details-shell">
            <div id="app-container" class="details-left"></div>
            <div id="details-right" class="details-right"></div>
        </div>
    </div>
</body>
</html>
